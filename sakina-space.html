  const mihFrame=new THREE.Mesh(new THREE.BoxGeometry(4.4,8,0.6),goldMat);mihFrame.position.set(0,4,-14.6);scene.add(mihFrame);
  const mihIn=new THREE.Mesh(new THREE.PlaneGeometry(3.4,6.8),wallMat);mihIn.position.set(0,3.4,-14.2);scene.add(mihIn);
  const mihArch=new THREE.Mesh(new THREE.TorusGeometry(1.7,0.18,8,24,Math.PI),goldMat);mihArch.position.set(0,6.8,-14.1);scene.add(mihArch);

  function lamp(x,y,z,s,b){const g=new THREE.PointLight(0xffd98a,b,16);g.position.set(x,y,z);scene.add(g);return g;}
  const mainLamp=lamp(0,3.8,-12,0.34,1.8);
  for(let i=0;i<6;i++){const a=(i/6)*Math.PI*2;lamp(Math.sin(a)*6.8,5,Math.cos(a)*6.8,0.16,0.6);}

  let lon=0,lat=4,down=false,px=0,py=0,autoT=0,touched=false;
  const dom=renderer.domElement;
  function d(e){down=true;touched=true;document.getElementById('title').classList.add('gone');px=(e.touches?e.touches[0].clientX:e.clientX);py=(e.touches?e.touches[0].clientY:e.clientY);}
  function m(e){if(!down)return;const cx=(e.touches?e.touches[0].clientX:e.clientX),cy=(e.touches?e.touches[0].clientY:e.clientY);lon-=(cx-px)*0.18;lat+=(cy-py)*0.18;lat=Math.max(-30,Math.min(60,lat));px=cx;py=cy;}
  function u(){down=false;}
  dom.addEventListener('mousedown',d);dom.addEventListener('mousemove',m);addEventListener('mouseup',u);
  dom.addEventListener('touchstart',d,{passive:true});dom.addEventListener('touchmove',m,{passive:true});addEventListener('touchend',u);
  addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
  setTimeout(()=>document.getElementById('load').classList.add('gone'),900);
  let t=0;
  (function animate(){requestAnimationFrame(animate);t+=0.005;
    if(!touched){autoT+=0.0011;lon=Math.sin(autoT)*24;}
    const phi=THREE.MathUtils.degToRad(90-lat),th=THREE.MathUtils.degToRad(lon);
    camera.lookAt(camera.position.x+Math.sin(phi)*Math.cos(th),camera.position.y+Math.cos(phi),camera.position.z+Math.sin(phi)*Math.sin(th));
    mainLamp.intensity=1.6+Math.sin(t*2)*0.3;domeL.intensity=1.7+Math.sin(t*1.3)*0.2;
    renderer.render(scene,camera);
  })();
}catch(e){document.getElementById('load').style.display='none';document.getElementById('err').style.display='flex';console.error(e);}
</script>
</body>
</html>
